<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje enviado — Draft Design Web</title>

    <style>
        body {
            background: #0d0d0d;
            color: #ffffff;
            font-family: "Inter", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 2rem;
        }

        .box {
            max-width: 480px;
            padding: 2.5rem;
            border-radius: 18px;
            background: #111;
            border: 1px solid rgba(201, 168, 106, 0.35);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #c9a86a;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.85;
            margin-bottom: 2rem;
        }

        a {
            display: inline-block;
            padding: 0.8rem 1.6rem;
            background: #c9a86a;
            color: #111;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
        }

        a:hover {
            background: #e3c58c;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>¡Gracias por tu mensaje!</h1>
        <p>Hemos recibido tu información correctamente.
            Me pondré en contacto contigo lo antes posible.</p>

        <a href="/">Volver a la web</a>
    </div>
</body>

</html>
